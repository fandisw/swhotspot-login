<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expired Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" />
</head>

<body>
    <div id="success-box" class="container-login">
        <span class="atas"></span>
        <span class="kanan"></span>
        <span class="bawah"></span>
        <span class="kiri"></span>
        
        <div class="dot"></div>
        <div class="dot two"></div>
        <div class="dot three"></div>
        <div class="line"></div>

        <div class="face2">
            <div class="eye"></div>
            <div class="eye right1"></div>
            <div class="mouth sad"></div>
        </div>

        <div class="title0" style="color: #ff4444; text-shadow: 0 0 10px rgba(255,68,68,0.6)">WAKTU HABIS!</div>
        
        <div class="shadow move"></div>
        
        <div class="title1">
            <h1>PELANGGAN YANG TERHORMAT</h1>
            Pemakaian internet anda sudah mencapai batas waktu yang ditentukan. 
            Silahkan beli voucher di halaman info untuk tetap terhubung ke internet.
        </div>

        <!-- CUMA 1 TOMBOL KE INFO.HTML -->
        <button class="btn-small" onclick="window.location='info.html';">
            <a>BELI VOUCHER</a>
        </button>

        <div class="copy">
            &copy; FANDI SW <script>document.write(new Date().getFullYear())</script>
        </div>
    </div>

    <style>
    /* KOTAK LUAR - GLOW MERAH */
    .container-login {
        position: relative;
        max-width: 420px;
        margin: 40px auto;
        padding: 30px 20px;
        border-radius: 20px;
        background: rgba(26, 10, 10, 0.7);
        backdrop-filter: blur(10px);
        
        border: 2px solid #ff3333;
        box-shadow: 
            0 0 10px #ff3333,
            0 0 20px #ff3333,
            0 0 40px rgba(255, 51, 51, 0.5),
            0 0 80px rgba(255, 0, 0, 0.3);
        animation: outerGlow 2s ease-in-out infinite;
    }

    @keyframes outerGlow {
        0%, 100% { 
            border-color: #ff3333;
            box-shadow: 
                0 0 10px #ff3333,
                0 0 20px #ff3333,
                0 0 40px rgba(255, 51, 51, 0.5),
                0 0 80px rgba(255, 0, 0, 0.3);
        }
        50% { 
            border-color: #ff5555;
            box-shadow: 
                0 0 15px #ff5555,
                0 0 30px #ff5555,
                0 0 60px rgba(255, 85, 85, 0.6),
                0 0 120px rgba(255, 51, 51, 0.4);
        }
    }

    /* TOMBOL KECIL MERAH */
    .btn-small {
        display: block;
        width: 60%;
        margin: 20px auto 0;
        text-align: center;
        background: transparent;
        color: #ff5555;
        padding: 12px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 13px;
        border: 1px solid #ff3333;
        box-shadow: 0 0 10px rgba(255, 51, 51, 0.2), 
                    inset 0 0 10px rgba(255, 51, 51, 0.1);
        transition: all 0.3s;
        cursor: pointer;
    }
    .btn-small:hover { 
        background: rgba(255, 51, 51, 0.1);
        box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        transform: translateY(-2px);
    }
    .btn-small a {
        color: #ff5555;
        text-decoration: none;
        letter-spacing: 0.5px;
    }

    .title1 {
        color: #c0c0c0;
        font-size: 12px;
        line-height: 1.5;
        margin: 15px 0;
        text-align: center;
    }
    .title1 h1 {
        color: #ff5555;
        font-size: 15px;
        margin-bottom: 8px;
        font-weight: 700;
    }

    .copy {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 10px;
    }

    /* HILANGKAN TOMBOL LAMA */
    .btn-container, .btno { display: none; }
    </style>
</body>
</html>
