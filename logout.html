<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">SW-HOTSPOT| Logout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" />
</head>

<script language="JavaScript">
    function openLogin() {
	if (window.name != 'hotspot_logout') return true;
	open('$(link-login)', '_blank', '');
	window.close();
	return false;
    }
</script>

<body>
    <div class="container-login">
        <div class="titik"></div>
        <div class="titik dua"></div>
        <div class="titik tiga"></div>
        <div class="line"></div>
        <span class="atas"></span>
        <span class="kanan"></span>
        <span class="bawah"></span>
        <span class="kiri"></span>
        
        <!-- LOGO DIHAPUS -->
        
        <!-- TEKS MUNCUL HILANG MERAH -->
        <div class="box" id="infologin">
            <div class="fade-text">ANDA TELAH LOGOUT</div>
        </div>

        <!-- menu item -->
        <div class="menu-items">
            <div class="row-items">
                <div class="title"> Ip Address</div>
                <div class="title"> $(ip)</div>
            </div>
            <div class="row-items">
                <div class="title"> Mac Address</div>
                <div class="title"> $(mac)</div>
            </div>
            <div class="row-items">
                <div class="title"> Upload</div>
                <div class="title"> $(bytes-in-nice)</div>
            </div>
            <div class="row-items">
                <div class="title"> Download</div>
                <div class="title"> $(bytes-out-nice)</div>
            </div>
            <div class="row-items">
                <div class="title"> Terkoneksi</div>
                <div class="title"> $(uptime)</div>
            </div>
            $(if remain-bytes-total)
            <div class="row-items">
                <div class="title"> Sisa Quota</div>
                <div class="title"> $(remain-bytes-total-nice)</div>
            </div>
            $(endif)
            $(if session-time-left)
            <div class="row-items">
                <div class="title"> Sisa Waktu</div>
                <div class="title"> $(session-time-left)</div>
            </div>
            $(endif)
        </div>

        <form action="$(link-login)" name="login" onSubmit="return openLogin()">
            <button class="btn-small" onclick="window.location='login.html';"><a>LOGIN LAGI</a></button>
        </form>

        <div class="copy">
            &copy; FANDI SW <script>document.write(new Date().getFullYear())</script>
        </div>
    </div>
</body>

<script type="text/javascript">
	document.getElementById('title').innerHTML = window.location.hostname + " > logout";
</script>

<style>
/* KOTAK LUAR - GLOW MERAH 2 DETIK */
.container-login {
    position: relative;
    max-width: 420px;
    margin: 20px auto;
    padding: 25px 20px;
    border-radius: 20px;
    background: rgba(10, 14, 26, 0.7);
    backdrop-filter: blur(10px);
    border: 2px solid #ff4444;
    box-shadow: 0 0 15px #ff4444, 0 0 30px #ff2222, 0 0 60px rgba(255, 68, 68, 0.5);
    animation: borderGlowRed 2s ease-in-out infinite;
}

@keyframes borderGlowRed {
    0%, 100% { 
        border-color: #ff4444;
        box-shadow: 0 0 15px #ff4444, 0 0 30px #ff2222, 0 0 60px rgba(255, 68, 68, 0.5);
    }
    50% { 
        border-color: #ff6666;
        box-shadow: 0 0 25px #ff6666, 0 0 50px #ff4444, 0 0 80px rgba(255, 100, 100, 0.7);
    }
}

/* TEKS MUNCUL HILANG MERAH */
.fade-text {
    color: #ff6666;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.5px;
    text-shadow: 0 0 8px rgba(255, 102, 102, 0.6);
    margin-top: 10px;
    margin-bottom: 20px;
    animation: fadeBlink 3s ease-in-out infinite;
}

@keyframes fadeBlink {
    0%, 100% { opacity: 0; transform: scale(0.95); }
    20%, 80% { opacity: 1; transform: scale(1); }
}

/* SUB TITLE DIHAPUS, PAKE FADE-TEXT AJA */

/* MENU ITEMS */
.menu-items {
    margin: 15px 0;
}
.row-items {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 68, 68, 0.1);
}
.row-items .title {
    font-size: 12px;
    color: #c0c0c0;
}
.row-items .title:first-child {
    color: #ff8888;
    font-weight: 600;
}

/* TOMBOL KECIL MERAH SERAGAM */
.btn-small {
    display: block;
    width: 60%;
    margin: 15px auto 0;
    text-align: center;
    background: rgba(255, 68, 68, 0.15);
    color: #ff6666;
    padding: 12px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
    border: 1px solid #ff4444;
    box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
    transition: all 0.3s;
    cursor: pointer;
}
.btn-small:hover { 
    background: rgba(255, 68, 68, 0.3);
    box-shadow: 0 0 20px rgba(255, 102, 102, 0.6);
    transform: translateY(-2px);
}
.btn-small a {
    color: #ff6666;
    text-decoration: none;
    letter-spacing: 0.5px;
}

/* COPY */
.copy {
    text-align: center;
    margin-top: 20px;
    color: #666;
    font-size: 10px;
}

/* HAPUS STYLE LOGO + ANIMASI Muter */
.logo, .logo::before, .logo::after { display: none; }
@keyframes spin, @keyframes spinReverse { /* dihapus */ }

/* HAPUS STYLE LAMA */
.btn, .btnq, .btn-container, .btno { display: none; }
.titik, .line, .atas, .kanan, .bawah, .kiri { display: none; }
</style>
</html>
